<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Register</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0f0f0f;
      --surface: #212121;
      --surface2: #272727;
      --border: #3f3f3f;
      --text-primary: #f1f1f1;
      --text-secondary: #aaaaaa;
      --accent: #ff0000;
    }

    body {
      background: var(--bg);
      color: var(--text-primary);
      font-family: 'Roboto', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 40px 36px;
      width: 100%;
      max-width: 400px;
      animation: fadeUp 0.4s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Logo */
    .logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-bottom: 28px;
      text-decoration: none;
    }
    .logo-play {
      background: var(--accent);
      border-radius: 5px;
      width: 34px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .logo-play::after {
      content: '';
      border-left: 10px solid white;
      border-top: 6px solid transparent;
      border-bottom: 6px solid transparent;
      margin-left: 2px;
    }
    .logo-text {
      font-size: 22px;
      font-weight: 700;
      color: var(--text-primary);
      letter-spacing: -0.5px;
    }

    h2 {
      font-size: 20px;
      font-weight: 500;
      text-align: center;
      margin-bottom: 6px;
    }

    .subtitle {
      font-size: 14px;
      color: var(--text-secondary);
      text-align: center;
      margin-bottom: 28px;
    }

    /* Error message */
    .error-msg {
      background: rgba(255, 0, 0, 0.1);
      border: 1px solid rgba(255, 0, 0, 0.3);
      color: #ff6b6b;
      font-size: 13px;
      padding: 10px 14px;
      border-radius: 8px;
      margin-bottom: 20px;
      text-align: center;
    }

    .form-group {
      margin-bottom: 18px;
    }

    label {
      display: block;
      font-size: 13px;
      color: var(--text-secondary);
      margin-bottom: 7px;
      font-weight: 500;
    }

    input[type="text"],
    input[type="email"],
    input[type="password"] {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      color: var(--text-primary);
      font-size: 15px;
      font-family: 'Roboto', sans-serif;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus {
      border-color: #3ea6ff;
      background: #121212;
    }
    input::placeholder { color: var(--text-secondary); }

    .submit-btn {
      width: 100%;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 11px;
      font-size: 15px;
      font-weight: 500;
      font-family: 'Roboto', sans-serif;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.15s, transform 0.1s;
    }
    .submit-btn:hover { background: #cc0000; }
    .submit-btn:active { transform: scale(0.98); }

    .footer-text {
      text-align: center;
      font-size: 13px;
      color: var(--text-secondary);
      margin-top: 22px;
    }
    .footer-text a {
      color: #3ea6ff;
      text-decoration: none;
      font-weight: 500;
    }
    .footer-text a:hover { text-decoration: underline; }
  </style>
</head>
<body>

<div class="card">

  <!-- Logo -->
  <a class="logo" th:href="@{/}">
    <div class="logo-play"></div>
    <span class="logo-text">YouTube</span>
  </a>

  <h2>Create account</h2>
  <p class="subtitle">to continue to YouTube</p>

  <!-- Error message -->
  <div class="error-msg" th:if="${param.error}">
    Something went wrong. Please try again.
  </div>

  <form onsubmit="register(event)">

    <div class="form-group">
      <label for="fullName">Full Name</label>
      <input type="text" id="fullName" name="fullName" placeholder="Enter your full name" required>
    </div>

    <div class="form-group">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" placeholder="Enter your email" required>
    </div>

    <div class="form-group">
      <label for="channelName">Channel Name</label>
      <input type="text" id="channelName" name="channelName" placeholder="Enter your channel name" required>
    </div>

    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" placeholder="Enter your password" required>
    </div>

    <button type="submit" class="submit-btn">Register</button>

  </form>

  <p class="footer-text">
    Already have an account? <a th:href="@{/login}">Sign in</a>
  </p>

  <p class="footer-text" style="margin-top: 10px;">
    <a th:href="@{/youtube/home}">Continue as guest →</a>
  </p>

</div>

<script>
  function register(event) {
    event.preventDefault();

    const fullName = document.getElementById("fullName").value;
    const email = document.getElementById("email").value;
    const channelName = document.getElementById("channelName").value;
    const password = document.getElementById("password").value;

    fetch("http://localhost:8081/api/auth/register", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        fullName: fullName,
        email: email,
        channelName: channelName,
        password: password
      })
    })
            .then(res => res.json())
            .then(data => {
              alert("Registration successful");
              window.location.href = "http://localhost:8081/login";
            })
            .catch(err => {
              alert("Registration failed");
            });
  }
</script>

</body>
</html>
